DWAPlannerROS:
  # 속도를 조금 더 올려서 마찰력을 힘으로 이겨내게 합니다.
  max_vel_x: 0.25        
  min_vel_x: 0.10        # 0.03은 너무 낮아 출발을 못 할 수 있습니다. 0.05로 올립니다.
  
  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 0.25
  min_vel_trans: 0.10
  trans_stopped_vel: 0.01

  max_vel_theta: 0.30    # 회전 속도를 조금 높여 궤적 수정 능력을 키웁니다.
  min_vel_theta: 0.05    # 회전 시에도 마찰력을 이기도록 최소 회전 속도 부여
  theta_stopped_vel: 0.05
  
  # 가속도를 살짝 높여서 출발 순간의 답답함을 없앱니다.
  acc_lim_x: 0.25        
  acc_lim_theta: 0.5
  acc_lim_y: 0.0

  yaw_goal_tolerance: 0.20
  xy_goal_tolerance: 0.30

  sim_time: 1.5
  vx_samples: 5         # 10에서 15로 높여 경로 탐색을 더 정밀하게 함
  vy_samples: 1
  vtheta_samples: 10     # 20에서 30으로 높임

  path_distance_bias: 16.0
  goal_distance_bias: 24.0
  occdist_scale: 0.03
  forward_point_distance: 0.1
  stop_time_buffer: 0.2
  scaling_speed: 0.10
  max_scaling_factor: 0.2
  oscillation_reset_dist: 0.05
  holonomic_robot: false
