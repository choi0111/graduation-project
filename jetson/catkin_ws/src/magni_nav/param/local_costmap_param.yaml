local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 0.5
  publish_frequency: 0.2
  transform_tolerance: 0.5

  # Lightweight local costmap for Jetson Nano.
  # The global planner still uses the saved map walls to create the corridor
  # route. The local planner only follows that route and does not process /scan
  # obstacles, which avoids stop-and-go CPU spikes.
  static_map: false
  rolling_window: true
  width: 2.0
  height: 2.0
  resolution: 0.20
  track_unknown_space: false

  plugins: []
