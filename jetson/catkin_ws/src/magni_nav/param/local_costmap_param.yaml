local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 0.5
  publish_frequency: 0.2
  transform_tolerance: 0.5

  # Dynamic obstacle avoidance is disabled: there is no /scan obstacle layer.
  # The saved map is still used in a small rolling window so DWA keeps clearance
  # from corridor walls without carrying the full static map as a local costmap.
  static_map: false
  rolling_window: true
  width: 2.0
  height: 2.0
  resolution: 0.20
  track_unknown_space: false

  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer:
    enabled: true
    map_topic: /map
    subscribe_to_updates: false
    track_unknown_space: false

  inflation_layer:
    enabled: true
    inflation_radius: 0.25
    cost_scaling_factor: 6.0
