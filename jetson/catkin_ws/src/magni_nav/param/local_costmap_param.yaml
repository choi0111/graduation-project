local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 2.0
  publish_frequency: 1.0
  transform_tolerance: 0.3

  # No obstacle avoidance: keep the local costmap as an empty rolling window.
  # AMCL still uses /scan for localization, but move_base no longer uses /scan
  # to stop, detour, or rotate around dynamic obstacles.
  static_map: false
  rolling_window: true
  width: 3.0
  height: 3.0
  resolution: 0.10
  track_unknown_space: false

  plugins: []
